<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Collections - Style Haven</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        /* Navbar Style */
        .nav-bar { display: flex; justify-content: space-between; padding: 20px 80px; align-items: center; border-bottom: 1px solid #eee; background: #fff; }
        .nav-bar a { text-decoration: none; color: #000; font-weight: bold; }

        /* Banner */
        .coll-banner { width: 100%; height: 300px; background: url('image2.png') center/cover; }
        
        /* Filter Row */
        .filter-row { display: flex; justify-content: center; gap: 20px; padding: 30px; background: #fff; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #eee; }
        .filter-btn { padding: 10px 20px; border: 1px solid #000; background: #fff; cursor: pointer; font-weight: bold; }
        .filter-btn:hover { background: #000; color: #fff; }

        /* Product Grid */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
            padding: 20px 80px; 
        }
        .p-card { border: 1px solid #eee; padding: 10px; text-align: center; }
        .p-card img { width: 100%; height: 250px; object-fit: cover; }
        .price { font-weight: bold; margin: 10px 0; }
        .add-btn { width: 100%; padding: 10px; background: #000; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html"><h2>STYLE HAVEN</h2></a>
        <div>
            <a href="index.html" style="margin-right: 20px;">HOME</a>
            <a href="collections.html">COLLECTIONS</a>
        </div>
    </div>

    <div class="coll-banner"></div>

    <div class="filter-row">
        <button class="filter-btn">ALL</button>
        <button class="filter-btn">T-SHIRTS</button>
        <button class="filter-btn">JEANS</button>
        <button class="filter-btn">SHIRTS</button>
    </div>

    <div class="product-grid">
        <div class="p-card"><img src="p1.jpg"><p>Product Name</p><p class="price">₹799</p><button class="add-btn">ADD TO CART</button></div>
        <div class="p-card"><img src="p2.jpg"><p>Product Name</p><p class="price">₹899</p><button class="add-btn">ADD TO CART</button></div>
        <div class="p-card"><img src="p3.jpg"><p>Product Name</p><p class="price">₹999</p><button class="add-btn">ADD TO CART</button></div>
        <div class="p-card"><img src="p4.jpg"><p>Product Name</p><p class="price">₹1299</p><button class="add-btn">ADD TO CART</button></div>
    </div>

</body>
</html>
