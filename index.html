<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Style Haven</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; padding: 20px 80px; background: #fff; border-bottom: 1px solid #eee; }
        .nav-links a { text-decoration: none; color: #000; font-weight: bold; margin-left: 20px; }
        
        /* Hero Section */
        .hero { height: 450px; background: url('image1.jpg') no-repeat center center/cover; display: flex; flex-direction: column; justify-content: center; padding-left: 80px; color: #fff; }
        
        /* Features Section */
        .features { display: flex; justify-content: space-around; padding: 40px; background: #f9f9f9; }
        
        /* Collections Section */
        .collections { padding: 40px; text-align: center; }
        .cat-grid { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .cat-box { width: 180px; height: 250px; background-size: cover; background-position: center; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 20px; color: white; font-weight: bold; }
        
        /* Promise Section */
        .promise { display: flex; padding: 60px; align-items: center; background: #fff; }
        .promise-img { width: 50%; height: 300px; background: url('image2.jpg') no-repeat center/cover; }
        .promise-text { width: 50%; padding-left: 50px; }
        
        /* Top Picks Section */
        .top-picks { padding: 40px; text-align: center; }
        .scroll-container { display: flex; overflow-x: auto; gap: 20px; padding: 20px 80px; }
        .p-card { min-width: 200px; text-align: left; }
        .p-img { width: 100%; height: 250px; background: #eee; }
        
        footer { background: #000; color: #fff; padding: 30px; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <h2>STYLE HAVEN</h2>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="collections.html">COLLECTIONS</a>
            <a href="admin.html">ADMIN</a>
        </div>
    </nav>

    <section class="hero">
        <h1>TIMELESS STYLE.<br>MADE FOR EVERYDAY.</h1>
    </section>

    <section class="features">
        <div>FREE SHIPPING</div>
        <div>PREMIUM QUALITY</div>
        <div>EASY RETURNS</div>
    </section>

    <section class="collections">
        <h2>EXPLORE OUR COLLECTIONS</h2>
        <div class="cat-grid">
            <div class="cat-box" style="background-image: url('tshirt.jpg');">T-SHIRTS</div>
            <div class="cat-box" style="background-image: url('hoodie.jpg');">HOODIES</div>
        </div>
    </section>

    <section class="promise">
        <div class="promise-img"></div>
        <div class="promise-text">
            <h3>OUR PROMISE</h3>
            <p>Quality you can feel, style you can trust.</p>
        </div>
    </section>

    <section class="top-picks">
        <h2>TOP PICKS</h2>
        <div class="scroll-container">
            <div class="p-card"><div class="p-img"></div><p>Black Tee</p></div>
            <div class="p-card"><div class="p-img"></div><p>Beige Tee</p></div>
        </div>
    </section>

    <footer><p>&copy; 2026 Style Haven</p></footer>

</body>
</html>
