<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Style Haven</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        .top-banner { background: #000; color: #fff; text-align: center; padding: 10px; font-size: 12px; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; padding: 20px 80px; align-items: center; border-bottom: 1px solid #eee; }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a { text-decoration: none; color: #000; font-weight: bold; font-size: 14px; }
        
        /* Hero */
        .hero { height: 450px; background: url('image1.jpg') no-repeat center center/cover; display: flex; flex-direction: column; justify-content: center; padding-left: 80px; color: #fff; }
        .hero h1 { font-size: 45px; line-height: 1.2; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .hero-btn { width: 160px; padding: 12px; margin-top: 20px; background: #fff; color: #000; border: none; cursor: pointer; font-weight: bold; }

        /* Main Banner (Features ke upar wala) */
        .main-banner-section { padding: 40px 80px; text-align: center; }
        .main-banner { width: 100%; height: auto; border-radius: 8px; }

        /* Features Section */
        .features-section { padding: 0 80px 50px 80px; text-align: center; }
        .features-section h2 { margin-bottom: 30px; font-size: 28px; }
        
        /* Grid layout for 4 images */
        .features-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        .features-grid img { 
            width: 100%; 
            height: auto; 
            border-radius: 8px; 
            display: block; 
        }

        /* Footer */
        footer { background: #000; color: #fff; padding: 40px; text-align: center; margin-top: 50px; }
        footer a { color: #fff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-banner">FREE SHIPPING ON ALL ORDERS ABOVE ₹999</div>
    
    <nav>
        <h2>STYLE HAVEN</h2>
        <div class="nav-links">
            <a href="#">HOME</a> <a href="#">SHOP</a> <a href="#">COLLECTIONS</a> <a href="#">ABOUT US</a> <a href="#">CONTACT</a>
        </div>
    </nav>

    <section class="hero">
        <h1>TIMELESS STYLE.<br>MADE FOR EVERYDAY.</h1>
        <button class="hero-btn">SHOP NOW</button>
    </section>

    <section class="main-banner-section">
        <img src="image2.png" alt="Main Banner" class="main-banner">
    </section>

    <section class="features-section">
        <h2>FEATURES</h2>
        <div class="features-grid">
            <img src="image3.png" alt="Feature 1">
            <img src="image4.png" alt="Feature 2">
            <img src="image5.png" alt="Feature 3">
            <img src="image6.png" alt="Feature 4">
        </div>
    </section>

    <footer>
        <div style="margin-bottom: 10px;"><a href="#">INSTAGRAM</a></div>
        <p>Contact Us: support@stylehaven.com</p>
        <p style="margin-top: 10px; font-size: 12px;">&copy; 2026 Style Haven. All rights reserved.</p>
    </footer>

</body>
</html>
