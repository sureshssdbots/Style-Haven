<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Style Haven - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a id="form-open" style="cursor:pointer;">LOGIN</a>
    </nav>

    <div id="loginModal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.6);">
        <div style="background:#fff; margin:5% auto; padding:25px; width:320px; text-align:center; border-radius:12px;">
            <h2 id="modalTitle">LOGIN</h2>
            <input type="text" id="email" placeholder="Email" style="width:100%; padding:10px; margin:5px 0;">
            <input type="password" id="password" placeholder="Password" style="width:100%; padding:10px; margin:5px 0;">
            
            <div id="signupFields" style="display:none;">
                <input type="text" id="name" placeholder="Full Name" style="width:100%; padding:10px; margin:5px 0;">
                <input type="text" id="phone" placeholder="Mobile Number" style="width:100%; padding:10px; margin:5px 0;">
                <input type="text" id="pincode" placeholder="Pincode" style="width:100%; padding:10px; margin:5px 0;">
            </div>
            
            <button id="actionBtn" onclick="handleAuth()" style="width:100%; padding:12px; background:#000; color:#fff; border:none; cursor:pointer; margin-top:15px;">LOGIN</button>
            <p id="toggleText" style="margin-top:15px; cursor:pointer; font-size:12px;">Don't have an account? <span onclick="toggleMode()" style="color:blue; text-decoration:underline;">Sign Up</span></p>
            <p style="margin-top:10px; cursor:pointer; font-size:12px; color:red;" onclick="document.getElementById('loginModal').style.display='none'">Close</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC4VyBsFir-iea2zHtC96o_0Qysl2D0qBs",
            authDomain: "style-haven-46faf.firebaseapp.com",
            projectId: "style-haven-46faf",
            databaseURL: "https://style-haven-46faf-default-rtdb.firebaseio.com/",
            storageBucket: "style-haven-46faf.firebasestorage.app",
            messagingSenderId: "4045949853",
            appId: "1:4045949853:web:34d7e591fbc059caa2bd74"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Modal Open
        document.getElementById('form-open').onclick = () => document.getElementById('loginModal').style.display = 'block';

        let isLogin = true;
        window.toggleMode = () => {
            isLogin = !isLogin;
            document.getElementById('signupFields').style.display = isLogin ? 'none' : 'block';
            document.getElementById('modalTitle').innerText = isLogin ? "LOGIN" : "SIGN UP";
            document.getElementById('actionBtn').innerText = isLogin ? "LOGIN" : "SIGN UP";
            document.getElementById('toggleText').innerHTML = isLogin ? "Don't have an account? <span onclick='toggleMode()' style='color:blue;'>Sign Up</span>" : "Already have an account? <span onclick='toggleMode()' style='color:blue;'>Login</span>";
        };

        window.handleAuth = () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if(isLogin) {
                signInWithEmailAndPassword(auth, email, password)
                    .then(() => { alert("Login Successful!"); document.getElementById('loginModal').style.display='none'; })
                    .catch(e => alert("Login Error: " + e.message));
            } else {
                createUserWithEmailAndPassword(auth, email, password)
                    .then(res => {
                        set(ref(db, 'users/'+res.user.uid), { 
                            name: document.getElementById('name').value, 
                            phone: document.getElementById('phone').value, 
                            pincode: document.getElementById('pincode').value 
                        });
                        alert("Signup Successful!");
                    }).catch(e => alert("Signup Error: " + e.message));
            }
        };
    </script>
    <script src="script.js"></script>
</body>
</html>
